services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: graphql_analytics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGTZ: UTC
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    command: >
      postgres
      -c listen_addresses=*
      -c password_encryption=scram-sha-256
    volumes:
      - ../schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "graphql_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  collector:
    build:
      context: ../apps/collector
      dockerfile: Dockerfile
    environment:
      OTLP_HTTP_PORT: "4318"
      COLLECTOR_DB_URL: postgres://collector_user:password@timescaledb:5432/graphql_analytics?sslmode=disable
      FLUSH_INTERVAL_SECONDS: 60
      BUCKET_CHANNEL_SIZE: 10000
    ports:
      - "4318:4318"        # OTLP HTTP — SDK sends here directly
      - "9001:9001"        # metrics /metrics endpoint
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NODE_ENV: production
      COLLECTOR_DB_URL: postgres://displayer_user:password@timescaledb:5432/graphql_analytics?sslmode=disable
      SCHEMA_SDL_PATH: /schema/schema.graphql
    ports:
      - "3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      collector:
        condition: service_started
    volumes:
      - ../schemas/schema.graphql:/schema/schema.graphql:ro
    restart: unless-stopped

  test-server:
    build:
      context: ..
      dockerfile: examples/test-server/Dockerfile
    environment:
      PORT: 4000
      GRAPHQL_ANALYTICS_COLLECTOR_URL: http://collector:4318
      GRAPHQL_ANALYTICS_METRICS_INTERVAL: 30000
      GRAPHQL_ANALYTICS_ENABLED: "true"
    ports:
      - "4000:4000"
    depends_on:
      collector:
        condition: service_started
    restart: unless-stopped

volumes:
  timescale_data:
