services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: graphql_analytics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGTZ: UTC
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    command: >
      postgres
      -c listen_addresses=*
      -c password_encryption=scram-sha-256
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "graphql_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  collector:
    build:
      context: ./packages/collector
      dockerfile: Dockerfile
    environment:
      COLLECTOR_UDP_PORT: 9000
      OTLP_ENABLED: "true"
      OTLP_HTTP_PORT: "4318"
      COLLECTOR_DB_URL: postgres://collector_user:password@timescaledb:5432/graphql_analytics?sslmode=disable
      FLUSH_INTERVAL_SECONDS: 60
      BUCKET_CHANNEL_SIZE: 10000
    ports:
      - "9000:9000/udp"   # UDP legacy intake
      - "4318:4318"        # OTLP HTTP — SDK sends here directly
      - "9001:9001"        # metrics /metrics endpoint
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NODE_ENV: production
      COLLECTOR_DB_URL: postgres://displayer_user:password@timescaledb:5432/graphql_analytics?sslmode=disable
      SCHEMA_SDL_PATH: /schema/schema.graphql
    ports:
      - "3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      collector:
        condition: service_started
    volumes:
      - ./schema.graphql:/schema/schema.graphql:ro
    restart: unless-stopped

volumes:
  timescale_data:
